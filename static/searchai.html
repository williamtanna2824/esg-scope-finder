<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESG Scope Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: linear-gradient(#0b3d2e, #0a2f24);
        color: #ffffff;
        overflow-x: hidden;
    }

    /* 🌳 Animated wind + tree background */
    .trees {
        position: fixed;
        width: 100%;
        height: 100%;
        background-image: url('https://i.ibb.co/2YpJ7jP/forest-silhouette.png');
        background-size: cover;
        background-position: bottom;
        opacity: 0.25;
        animation: wind 12s ease-in-out infinite alternate;
        z-index: -1;
    }
    @keyframes wind {
        0% { transform: translateX(0px); }
        100% { transform: translateX(-25px); }
    }

    .container {
        padding: 40px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .title {
        font-size: 42px;
        font-weight: 700;
        margin-bottom: 10px;
    }

    .subtitle {
        font-size: 18px;
        margin-bottom: 30px;
        opacity: 0.9;
    }

    /* 🔥 Glass cards */
    .card {
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.25);
        padding: 20px;
        border-radius: 18px;
        margin-top: 20px;
        backdrop-filter: blur(10px);
    }

    .input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        margin-top: 10px;
        margin-bottom: 20px;
        font-size: 16px;
    }

    .button {
        padding: 14px 20px;
        background: #00c77e;
        color: #000;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        border: none;
        margin-right: 10px;
    }

    .button:disabled {
        background: #777;
    }

    .logo {
        height: 60px;
        border-radius: 8px;
        background: #fff;
        padding: 5px;
    }

    .company-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-top: 15px;
    }

    .chat-box {
        height: 180px;
        overflow-y: auto;
        padding: 10px;
        border-radius: 10px;
        background: rgba(255,255,255,0.10);
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="trees"></div>

<div class="container">
    <div class="title">🌍 WITCH FOR FITCH</div>
    <div class="subtitle">Find ESG reports, extract Scope 1–3 emissions, see page numbers, ask questions, and compare companies in real time.</div>

    <div class="card">
        <label>Company</label>
        <input id="companyInput" class="input" placeholder="e.g., JPMorgan Chase">

        <label>Year</label>
        <input id="yearInput" class="input" placeholder="e.g., 2024">

        <button class="button" onclick="findReport()">🔎 Find report & extract scopes</button>
        <button class="button" onclick="startVoice()">🎤 Speak company</button>
        <button class="button" onclick="downloadHistory()">📥 Download JSON</button>
        <button class="button" onclick="exportNotebookLM()">🧠 NotebookLM export</button>
    </div>

    <!-- Company Profile -->
    <div id="profileCard" class="card" style="display:none;"></div>

    <!-- Report Match -->
    <div id="matchCard" class="card" style="display:none;"></div>

    <!-- Scope Results -->
    <div id="scopesCard" class="card" style="display:none;"></div>

    <!-- Summary -->
    <div id="summaryCard" class="card" style="display:none;"></div>

    <!-- Chart Comparison -->
    <div id="chartCard" class="card" style="display:none;">
        <h3>📊 Scope Comparison (tCO₂e)</h3>
        <canvas id="scopeChart"></canvas>
    </div>

    <!-- Q&A -->
    <div class="card">
        <h3>💬 Ask the report</h3>
        <input id="questionInput" class="input" placeholder="Ask anything about the report...">
        <button class="button" onclick="askQA()">Ask</button>
        <div id="qaBox" class="chat-box"></div>
    </div>

</div>

<script>
let lastPdfURL = null;
let lastCompany = null;
let lastYear = null;
let lastTextBlock = null;

async function findReport() {
    const company = document.getElementById("companyInput").value;
    const year = parseInt(document.getElementById("yearInput").value);

    const r = await fetch("/find_esg_pdf", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ company, year })
    });
    const data = await r.json();

    if (data.detail) {
        alert("Error: " + data.detail);
        return;
    }

    lastCompany = company;
    lastYear = year;
    lastPdfURL = data.pdf_url;

    // ---- Show profile ----
    const p = data.company_profile;
    document.getElementById("profileCard").style.display = "block";
    document.getElementById("profileCard").innerHTML = `
        <div class="company-header">
            <img class="logo" src="${p.logo_url}" onerror="this.style.display='none'">
            <div>
                <h2>${p.name}</h2>
                <a href="${p.website}" target="_blank" style="color:#00ffbf;">${p.website}</a>
                <p>${p.description || "No description available."}</p>
            </div>
        </div>
    `;

    // ---- Show match ----
    document.getElementById("matchCard").style.display = "block";
    document.getElementById("matchCard").innerHTML = `
        <h3>Report Match</h3>
        <p><b>Title:</b> ${data.title}</p>
        <p><b>Confidence:</b> ${data.confidence}/100</p>
        <p><a href="${data.pdf_url}" style="color:#00ffbf;" target="_blank">📄 Open ESG Report</a></p>
    `;

    // ---- Extract scopes ----
    extractScopes();
}

async function extractScopes() {
    const r = await fetch("/extract_scopes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pdf_url: lastPdfURL, company: lastCompany, year: lastYear })
    });

    const data = await r.json();

    if (!data.scopes) {
        alert("Extraction error.");
        return;
    }

    const s = data.scopes;

    // ---- Show scopes ----
    document.getElementById("scopesCard").style.display = "block";
    document.getElementById("scopesCard").innerHTML = `
        <h3>📌 Scope 1</h3>
        <p><b>Value:</b> ${s.scope1.numeric_value} ${s.scope1.units}</p>
        <p><b>Year:</b> ${s.scope1.year}</p>
        <p><b>Page:</b> ${s.scope1.page_number}</p>
        <p><b>Confidence:</b> ${s.scope1.confidence}/100</p>

        <h3>⚡ Scope 2</h3>
        <p><b>Value:</b> ${s.scope2.numeric_value} ${s.scope2.units}</p>
        <p><b>Year:</b> ${s.scope2.year}</p>
        <p><b>Page:</b> ${s.scope2.page_number}</p>
        <p><b>Confidence:</b> ${s.scope2.confidence}/100</p>

        <h3>🚚 Scope 3</h3>
        <p><b>Value:</b> ${s.scope3.numeric_value} ${s.scope3.units}</p>
        <p><b>Year:</b> ${s.scope3.year}</p>
        <p><b>Page:</b> ${s.scope3.page_number}</p>
        <p><b>Confidence:</b> ${s.scope3.confidence}/100</p>
    `;

    // ---- Summary ----
    document.getElementById("summaryCard").style.display = "block";
    document.getElementById("summaryCard").innerHTML = `
        <h3>📘 Summary</h3>
        <p>${s.summary}</p>
    `;

    // ---- Chart ----
    document.getElementById("chartCard").style.display = "block";
    new Chart(document.getElementById("scopeChart"), {
        type: "bar",
        data: {
            labels: ["Scope 1", "Scope 2", "Scope 3"],
            datasets: [{
                label: "tCO₂e",
                data: [
                    s.scope1.numeric_value || 0,
                    s.scope2.numeric_value || 0,
                    s.scope3.numeric_value || 0
                ],
                backgroundColor: ["#00ffbf", "#00c77e", "#00995e"]
            }]
        },
        options: { responsive: true }
    });
}

async function askQA() {
    const q = document.getElementById("questionInput").value;
    if (!lastPdfURL) return;

    const r = await fetch("/ask_about_pdf", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pdf_url: lastPdfURL, question: q, company: lastCompany, year: lastYear })
    });

    const data = await r.json();

    document.getElementById("qaBox").innerHTML += `
        <p><b>You:</b> ${q}</p>
        <p><b>ESG Bot:</b> ${data.answer}</p>
        <hr>
    `;
}

function startVoice() {
    const rec = new webkitSpeechRecognition();
    rec.lang = "en-US";
    rec.start();
    rec.onresult = e => {
        document.getElementById("companyInput").value = e.results[0][0].transcript;
    };
}

function downloadHistory() {
    const blob = new Blob([JSON.stringify({company:lastCompany,year:lastYear}, null, 2)], {type:'application/json'});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "esg_history.json";
    link.click();
}

async function exportNotebookLM() {
    const r = await fetch("/scope_text", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ pdf_url:lastPdfURL })
    });

    const data = await r.json();
    const blob = new Blob([data.text], {type:"text/plain"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "NotebookLM_ESG_Context.txt";
    link.click();
}
</script>

</body>
</html>
